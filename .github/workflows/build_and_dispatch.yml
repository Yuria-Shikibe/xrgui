name: Build XRGUI with Preview MSVC

env:
  PYTHONUTF8: 1
  VULKAN_VER: 1.4.341.1

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ==========================================
      # 第一阶段：轻量级环境与资产生成（Fail-fast）
      # ==========================================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 请根据你的 Python 脚本实际需求，在这里补全需要安装的包
          # 如果你项目里有 requirements.txt，可以直接换成: pip install -r requirements.txt
          pip install tomli # 假设解析 config.toml 需要此包，请按需修改

      - name: Setup Slang Compiler
        run: |
          # 1. 通过 GitHub API 获取最新的 Release 信息
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shader-slang/slang/releases/latest"
          $tag = $release.tag_name
          
          # 2. 剥离可能存在的 'v' 前缀以获取纯数字版本号 (例如将 v2026.7 转换为 2026.7)
          $version = $tag -replace '^v', ''
          
          # 3. 拼接真实的下载链接
          $downloadUrl = "https://github.com/shader-slang/slang/releases/download/$tag/slang-$version-windows-x86_64.zip"
          Write-Host "Downloading Slang Compiler from: $downloadUrl"
          
          # 4. 下载并解压
          Invoke-WebRequest -Uri $downloadUrl -OutFile slang.zip
          Expand-Archive slang.zip -DestinationPath C:\slang
          
          # 5. 注入环境变量
          echo "C:\slang\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Vulkan SDK
        run: |
          Write-Host "Downloading Vulkan SDK ${{ env.VULKAN_VER }}..."
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VER }}/windows/vulkansdk-windows-X64-${{ env.VULKAN_VER }}.exe" -OutFile VulkanSDK.exe
          
          Write-Host "Installing Vulkan SDK (Headers and Loader)..."
          Start-Process -FilePath .\VulkanSDK.exe -ArgumentList "--root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          
          Write-Host "Configuring Environment Variables..."
          echo "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\VulkanSDK\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate Assets (Icon & Slang)
        run: |
          # 由于是全局 task，无需 MSVC 和 xmake f 即可直接运行
          xmake gen_slang
          xmake gen_icon

      # ==========================================
      # 第二阶段：重度编译环境配置（耗时较长）
      # ==========================================

      - name: Download and Install MSVC Preview (VS 2026 Insider)
        shell: pwsh
        run: |
          # 下载 VS 2026 Preview 的 Build Tools 引导程序
          Invoke-WebRequest -Uri "https://aka.ms/vs/18/pre/vs_buildtools.exe" -OutFile "vs_buildtools_pre.exe"
          
          # 设定静默安装参数（仅安装 C++ 核心编译组件以节省时间）
          $installArgs = @(
            "--quiet",
            "--wait",
            "--norestart",
            "--nocache",
            "--installPath", "C:\VS2026Preview",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--includeRecommended"
          )
          
          Write-Host "Starting MSVC Insider installation..."
          $process = Start-Process -FilePath ".\vs_buildtools_pre.exe" -ArgumentList $installArgs -Wait -PassThru -NoNewWindow
          
          if ($process.ExitCode -eq 0 -or $process.ExitCode -eq 3010) {
              Write-Host "Installation completed successfully."
          } else {
              Write-Error "Installation failed with exit code: $($process.ExitCode)"
              exit 1
          }
          
      - name: Export MSVC Insider Environment to GITHUB_ENV
        shell: pwsh
        run: |
          # 借用 cmd 执行 bat 并打印环境变量，筛选出变化后写入 GitHub 全局环境
          $envLines = cmd /c "call `"C:\VS2026Preview\VC\Auxiliary\Build\vcvarsall.bat`" x64 >nul && set"
          foreach ($line in $envLines) {
              if ($line -match "^(.*?)=(.*)$") {
                  $key = $matches[1]
                  $value = $matches[2]
                  # 排除一些无用的基础变量防止冲突
                  if ($key -notin "PROMPT", "ComSpec") {
                      echo "$key=$value" >> $env:GITHUB_ENV
                  }
              }
          }

      # ==========================================
      # 第三阶段：核心编译与产物上传
      # ==========================================

      - name: Configure xmake
        run: xmake f -m release --toolchain=msvc --vs=2026 --vs_toolset=14.52 -cyv

      - name: Build xrgui.example
        run: xmake -v xrgui.example

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xrgui-example-windows-release
          path: build/windows/x64/release/