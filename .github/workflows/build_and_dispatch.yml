name: Build XRGUI with Preview MSVC

env:
  VULKAN_VER: 1.4.341.1

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Vulkan SDK
        run: |
          Write-Host "Downloading Vulkan SDK ..."
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VER }}/windows/VulkanSDK-${{ env.VULKAN_VER }}-Installer.exe" -OutFile VulkanSDK.exe
          
          Write-Host "Installing Vulkan SDK (Headers and Loader)..."
          # LunarG 安装器支持通过命令行静默安装
          Start-Process -FilePath .\VulkanSDK.exe -ArgumentList "--root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          
          Write-Host "Configuring Environment Variables..."
          echo "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\VulkanSDK\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Visual Studio Preview Build Tools (Minimal)
        run: |
          Write-Host "Downloading VS Build Tools Preview..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/pre/vs_buildtools.exe" -OutFile vs_buildtools.exe
          
          Write-Host "Installing Minimal C++ Toolchain (MSVC + WinSDK only)..."
          Start-Process -FilePath .\vs_buildtools.exe -ArgumentList "--quiet --wait --norestart --nocache --installPath C:\BuildTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.22621" -Wait -NoNewWindow
          
          Write-Host "Adding Tools to PATH..."
          echo "C:\BuildTools\Common7\Tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Slang Compiler
        run: |
          Invoke-WebRequest -Uri "https://github.com/shader-slang/slang/releases/latest/download/slang-windows-x86_64.zip" -OutFile slang.zip
          Expand-Archive slang.zip -DestinationPath C:\slang
          echo "C:\slang\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and Generate Assets
        run: |
          xmake f -m release --toolchain=msvc -yv
          xmake gen_slang
          xmake gen_icon

      - name: Build xrgui.example
        run: xmake -v xrgui.example

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xrgui-example-windows-release
          path: build/windows/x64/release/